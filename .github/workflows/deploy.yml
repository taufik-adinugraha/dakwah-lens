name: Deploy

# Trigger rules:
#   push to main         → prod (dakwah-lens.id)
#   manual via UI        → also prod, lets you retry without a code change
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialise deploys. New deploys queue behind running ones — mid-deploy
# cancellation would leave the VM with a half-built artifact (a partially
# built Docker image, a half-applied migration). `cancel-in-progress:false`
# is the explicit, slow-but-safe choice.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ─── Pre-flight ──────────────────────────────────────────────
  # Catch the easy errors on the GitHub runner BEFORE we touch the VM.
  # A type error or lint failure here costs ~1 min; the same failure
  # on the VM costs 5+ min of Docker build before it surfaces.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web — install
        working-directory: web
        run: npm ci --prefer-offline --no-audit

      - name: Web — lint
        working-directory: web
        run: npx eslint .

      # `next build` is the canonical typecheck for App Router projects —
      # `PageProps`/`LayoutProps` globals are only emitted into
      # `.next/types/` during build, so a bare `tsc --noEmit` reports them
      # as undefined. Building also catches runtime config issues (CSS
      # extraction, route grouping, server/client boundary slips) that
      # tsc alone would miss.
      - name: Web — build (typecheck + bundle)
        working-directory: web
        run: npm run build

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: API — install
        working-directory: api
        run: uv sync --frozen

      - name: API — lint
        working-directory: api
        run: uv run ruff check src/

  # ─── Deploy ──────────────────────────────────────────────────
  # SSHes to the VM and runs deploy.sh. All Docker work happens there;
  # this step is just the trigger.
  #
  # User-facing notice: at deploy start we POST to /api/internal/deploy-event
  # with state="deploying" so the centered overlay locks the app in every
  # open browser tab. At deploy end (success or failure) we POST state="idle"
  # or "failed" to clear/replace the overlay. Both webhook calls are HMAC-
  # signed against DEPLOY_WEBHOOK_SECRET. The final `always()` step makes
  # sure we never leave the overlay stuck if SSH fails midway.
  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Notify users — deploy starting
        run: |
          set -e
          BODY=$(jq -nc \
            --arg state "deploying" \
            --arg sha "${GITHUB_SHA}" \
            --arg msg "$(git log -1 --pretty=%s "$GITHUB_SHA" 2>/dev/null || echo '')" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state, commit_sha:$sha, commit_message:$msg, workflow_run_url:$url}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | awk '{print $2}')"
          curl -sS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: $SIG" \
            -d "$BODY" || echo "WARN: deploy-event start ping failed; continuing"

      - name: SSH + deploy
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # 45 min ceiling. The COLD first build pulls ~2 GB of CPU-only
          # PyTorch + transformers wheels and that alone can eat 15-20 min
          # on a small VM. Warm rebuilds finish in 1-2 min because layer
          # cache hits. 45 leaves slack for the worst case.
          command_timeout: 45m
          script: |
            set -euo pipefail
            bash /srv/dakwah-lens/repo/deploy/deploy.sh

      - name: Notify users — deploy finished
        # `always()` so the overlay clears even if SSH failed — leaving
        # users staring at a non-dismissible overlay forever is worse than
        # silently swallowing the failure here. State reports success or
        # failure based on the SSH step's conclusion.
        if: always()
        run: |
          set -e
          STATE="idle"
          if [ "${{ steps.ssh_deploy.outcome }}" != "success" ]; then
            STATE="failed"
          fi
          BODY=$(jq -nc \
            --arg state "$STATE" \
            --arg sha "${GITHUB_SHA}" \
            --arg msg "$(git log -1 --pretty=%s "$GITHUB_SHA" 2>/dev/null || echo '')" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state, commit_sha:$sha, commit_message:$msg, workflow_run_url:$url}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | awk '{print $2}')"
          curl -sS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: $SIG" \
            -d "$BODY" || echo "WARN: deploy-event finish ping failed"
