<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tileable arabesque tile (octagonal interlace) -->
  <defs>
    <pattern id="tile" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="1" />
      <polygon points="50,15 80,35 80,65 50,85 20,65 20,35" fill="none" stroke="currentColor" stroke-width="1.2" />
      <polygon points="50,30 70,42 70,58 50,70 30,58 30,42" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.7" />
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#tile)" />
</svg>
