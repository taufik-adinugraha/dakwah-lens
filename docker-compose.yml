services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dakwah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dakwah_dev}
      POSTGRES_DB: ${POSTGRES_DB:-dakwah_lens}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dakwah}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IndoBERT sentiment service — added in week 3
  # indobert:
  #   build: ./services/indobert
  #   ports:
  #     - "8001:8000"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2G

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
