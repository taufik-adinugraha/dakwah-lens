# Islamic calendar occasions for the 15th briefing track.
#
# OPERATOR PLAYBOOK:
#   - Refresh annually. Replace `confirmed: false` rows with confirmed
#     Kemenag SKB 3-Menteri dates when the official notice is issued.
#   - The 14-day lookahead window in the Sunday 05:00 WIB cron absorbs
#     ±1-2 day rukyat drift, so approximate dates still produce timely
#     briefings — you just may want to refine the Gregorian date if the
#     occasion is going to fall noticeably away from the approximation.
#   - DO NOT change `slug` once an occasion has produced a briefing in
#     prod (the slug is the dedupe key + URL path component). Add a new
#     entry instead.
#
# Schema per occasion (all required unless marked optional):
#   slug                     — stable lowercase-dash id, used as
#                              occasion_slug column + URL path component
#   name                     — human-readable Indonesian label
#   hijri_year               — Hijri year (e.g. 1448)
#   hijri_date               — display string ("9-10 Muharram 1448 H")
#   gregorian_date           — ISO 8601 date when the occasion lands
#                              (use the PRIMARY day for multi-day events,
#                              e.g. 10 Muharram for Asyura)
#   query_template           — semantic query passed to retrieve_daleel
#                              (mix occasion-name + key fiqh/sirah terms)
#   include_trending_headlines  optional, default true — when true, dump
#                              attaches top-8 last-7d headlines as
#                              BERITA PENDUKUNG supporting evidence
#   confirmed                — false until operator verifies vs Kemenag SKB
#   notes                    optional — operator scratch field

