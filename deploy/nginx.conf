# Dakwah-Lens — two environments behind one nginx.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/dakwah-lens
#   sudo ln -sf /etc/nginx/sites-available/dakwah-lens /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS:
#   sudo certbot --nginx -d dakwah-lens.id -d www.dakwah-lens.id -d dev.dakwah-lens.id
# Certbot will inject the listen 443 + ssl_certificate lines into each
# server block automatically — leave them alone after that.
#
# Port plan:
#   prod web :3000, prod api :8000
#   dev  web :3100, dev  api :8100

# ── Production ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dakwah-lens.id www.dakwah-lens.id;

    # /api/* → FastAPI. Trailing slash on proxy_pass strips the /api prefix
    # so /api/health on the public side hits /health on the upstream.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → Next.js. Upgrade headers are for HMR/Edge runtime,
    # harmless in production.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}

# ── Development ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dev.dakwah-lens.id;

    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}
